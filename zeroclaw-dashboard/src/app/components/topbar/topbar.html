<header
    class="h-16 w-full flex items-center justify-between px-8 border-b border-[#1f1f1f] bg-[#0a0a0a]/90 backdrop-blur-md z-10 sticky top-0">

    <!-- Left: Context / Path -->
    <div class="flex items-center gap-2 text-sm text-gray-400">
        <span class="hover:text-white cursor-pointer transition-colors">Workspace</span>
        <span class="text-gray-600">/</span>
        <span class="text-white font-medium">{{ currentTitle() }}</span>
    </div>

    <!-- Center: Global Search -->
    <div class="flex-1 max-w-md mx-8">
        <div
            class="relative flex items-center w-full h-9 rounded-lg bg-[#1a1a1a] border border-[#2d2d2d] focus-within:border-[#4d4d4d] focus-within:ring-1 focus-within:ring-[#4d4d4d] transition-all">
            <svg class="absolute left-3 w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" placeholder="Search across OS..."
                class="w-full bg-transparent border-none text-sm text-gray-200 pl-10 pr-3 focus:outline-none placeholder-gray-600">
            <div class="absolute right-2 flex items-center gap-1">
                <kbd
                    class="hidden sm:inline-block px-1.5 py-0.5 text-[10px] font-mono text-gray-500 bg-[#2d2d2d] rounded border border-[#3d3d3d]">⌘</kbd>
                <kbd
                    class="hidden sm:inline-block px-1.5 py-0.5 text-[10px] font-mono text-gray-500 bg-[#2d2d2d] rounded border border-[#3d3d3d]">K</kbd>
            </div>
        </div>
    </div>

    <!-- Right: Actions & Profile -->
    <div class="flex items-center gap-4">
        <!-- Utility Buttons -->
        <div class="flex items-center gap-2">
            <button class="p-2 text-gray-500 hover:text-white hover:bg-[#1a1a1a] rounded-lg transition-colors"
                title="Sync">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                    </path>
                </svg>
            </button>
            <button class="p-2 text-gray-500 hover:text-white hover:bg-[#1a1a1a] rounded-lg transition-colors"
                title="Pause Engine">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </button>
            <button
                class="hidden sm:flex items-center gap-2 px-3 py-1.5 ml-2 text-sm font-medium text-emerald-400 bg-emerald-500/10 hover:bg-emerald-500/20 rounded border border-emerald-500/20 transition-colors">
                <span class="relative flex h-2 w-2">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                Ping Agent
            </button>
        </div>

        <div class="h-4 w-px bg-[#2d2d2d] mx-2"></div>

        <!-- Profile -->
        <div class="flex items-center gap-3">
            <div class="text-right hidden md:block">
                <p class="text-xs font-medium text-gray-300">Admin</p>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Sovereign Link</p>
            </div>
            <div
                class="h-8 w-8 rounded-full bg-gradient-to-tr from-purple-600 to-blue-500 p-[2px] shadow-[0_0_10px_rgba(168,85,247,0.2)] cursor-pointer">
                <div class="h-full w-full rounded-full bg-[#121212] flex items-center justify-center">
                    <span class="text-gray-100 font-bold text-xs">ZC</span>
                </div>
            </div>
        </div>
    </div>
</header>
