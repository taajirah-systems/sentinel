<div class="h-full flex p-8 gap-8 overflow-hidden">

    <!-- Left Pane: File Directory -->
    <div
        class="w-80 flex flex-col bg-[#0f0f0f] border border-zinc-900 rounded-xl shadow-2xl overflow-hidden shrink-0 transition-all hover:border-zinc-800">
        <div class="p-5 border-b border-zinc-900 flex justify-between items-center bg-zinc-900/30">
            <h2 class="text-sm font-semibold tracking-widest text-zinc-300 uppercase">Memory Vault</h2>
            <button class="text-zinc-500 hover:text-zinc-300 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
            </button>
        </div>
        <div class="flex-1 overflow-y-auto p-3 space-y-1">
            <div *ngFor="let item of memoryItems" (click)="selectFile(item)"
                class="flex items-center justify-between p-3 rounded-lg cursor-pointer transition-colors"
                [ngClass]="activeFile?.id === item.id ? 'bg-zinc-800/80 border border-zinc-700/50 shadow-inner' : 'hover:bg-zinc-800/40 border border-transparent'">

                <div class="flex items-center gap-3">
                    <svg *ngIf="item.type === 'folder'" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-blue-500">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                    </svg>
                    <svg *ngIf="item.type === 'file' && item.icon === 'file-text'" xmlns="http://www.w3.org/2000/svg"
                        width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        class="text-zinc-400">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                        <polyline points="10 9 9 9 8 9" />
                    </svg>
                    <svg *ngIf="item.type === 'file' && item.icon === 'code'" xmlns="http://www.w3.org/2000/svg"
                        width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        class="text-emerald-500">
                        <polyline points="16 18 22 12 16 6" />
                        <polyline points="8 6 2 12 8 18" />
                    </svg>

                    <div>
                        <span class="text-sm font-medium"
                            [ngClass]="item.type === 'folder' ? 'text-zinc-200' : 'text-zinc-400 font-mono text-[13px]'">{{
                            item.name }}</span>
                    </div>
                </div>
                <div class="text-[10px] text-zinc-600 font-mono">{{ item.size || '' }}</div>
            </div>
        </div>
    </div>

    <!-- Right Pane: Content Viewer -->
    <div
        class="flex-1 flex flex-col bg-[#0b0b0b] border border-zinc-900 rounded-xl shadow-inner overflow-hidden relative">

        <div *ngIf="!activeFile" class="flex-1 flex flex-col items-center justify-center text-zinc-600">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1" class="mb-4 opacity-30">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
            </svg>
            <p class="font-mono text-sm tracking-widest uppercase">Select a node in the vault</p>
        </div>

        <ng-container *ngIf="activeFile">
            <div
                class="px-8 py-5 border-b border-zinc-900/80 bg-[#0f0f0f] flex justify-between items-center shadow-md z-10">
                <h3 class="text-lg font-mono text-zinc-200 flex items-center gap-3">
                    <svg *ngIf="activeFile.icon === 'file-text'" xmlns="http://www.w3.org/2000/svg" width="20"
                        height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        class="text-emerald-400">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                        <polyline points="10 9 9 9 8 9" />
                    </svg>
                    <svg *ngIf="activeFile.icon === 'code'" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-blue-400">
                        <polyline points="16 18 22 12 16 6" />
                        <polyline points="8 6 2 12 8 18" />
                    </svg>
                    {{ activeFile.name }}
                </h3>
                <div class="flex gap-3">
                    <button
                        class="px-4 py-2 rounded-lg bg-zinc-900 border border-zinc-800 text-zinc-400 text-xs font-medium hover:bg-zinc-800 hover:text-white transition-colors">Edit</button>
                    <button
                        class="px-4 py-2 rounded-lg bg-zinc-900 border border-zinc-800 text-zinc-400 text-xs font-medium hover:bg-emerald-600/20 hover:text-emerald-400 hover:border-emerald-500/30 transition-colors">Download</button>
                </div>
            </div>

            <div class="flex-1 p-8 overflow-y-auto bg-[#0a0a0a]">
                <pre
                    class="font-mono text-sm text-zinc-300 leading-relaxed whitespace-pre-wrap"><code [class]="'language-' + (activeFile.name.endsWith('.json') ? 'json' : 'markdown')">{{ activeFile.content }}</code></pre>
            </div>
        </ng-container>

    </div>

</div>
